    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const entry of extResources) {

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

DER<\u002Fdiv>\n        <h3 style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 30px; margin: 0 0 16px; color: #F5EFE0; line-height: 1.1;\">K Chha Nepal<\u002Fh3>\n        <p style=\"font-size: 15px; line-height: 1.75; color: rgba(245,239,224,0.58); margin: 0 0 28px; text-wrap: pretty;\">A rapidly growing Nepali digital media platform covering politics, current affairs, interviews, and public discourse.<\u002Fp>\n        <div style=\"display: inline-flex; align-items: center; gap: 10px; background: rgba(201,150,62,0.1); border: 1px solid rgba(201,150,62,0.3); border-radius: 100px; padding: 10px 18px;\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"#C9963E\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 1v12M1 7h12\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 16px; color: #C9963E;\">500K+<\u002Fspan>\n          <span style=\"font-size: 10px; font-weight: 600; letter-spacing: 0.14em; color: rgba(245,239,224,0.55);\">SUBSCRIBERS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- The Nation Speaks -->\n      <div style=\"background: #212126; border: 1px solid rgba(201,150,62,0.22); border-radius: 24px; padding: 40px 32px; transition: transform 0.35s, border-color 0.35s; animation: acScaleIn 1ms linear both; animation-timeline: view(); animation-range: entry 0% entry 40%;\" style-hover=\"transform: translateY(-8px); border-color: rgba(201,150,62,0.55);\">\n        <div style=\"font-size: 10px; font-weight: 700; letter-spacing: 0.28em; color: #C9963E; margin-bottom: 14px;\">EXECUTIVE PRODUCER<\u002Fdiv>\n        <h3 style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 30px; margin: 0 0 16px; color: #F5EFE0; line-height: 1.1;\">The Nation Speaks<\u002Fh3>\n        <p style=\"font-size: 15px; line-height: 1.75; color: rgba(245,239,224,0.58); margin: 0 0 28px; text-wrap: pretty;\">One of Nepal's most talked-about political discussion programs — in-depth conversations with national leaders, policymakers, experts, and public figures.<\u002Fp>\n        <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: rgba(245,239,224,0.45);\">Hosted by Rajendra Baniya<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- In Conversation -->\n      <div style=\"background: #212126; border: 1px solid rgba(201,150,62,0.22); border-radius: 24px; padding: 40px 32px; transition: transform 0.35s, border-color 0.35s; animation: acScaleIn 1ms linear both; animation-timeline: view(); animation-range: entry 0% entry 40%;\" style-hover=\"transform: translateY(-8px); border-color: rgba(201,150,62,0.55);\">\n        <div style=\"font-size: 10px; font-weight: 700; letter-spacing: 0.28em; color: #C9963E; margin-bottom: 14px;\">HOST<\u002Fdiv>\n        <h3 style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 30px; margin: 0 0 16px; color: #F5EFE0; line-height: 1.1;\">In Conversation With Anita<\u002Fh3>\n        <p style=\"font-size: 15px; line-height: 1.75; color: rgba(245,239,224,0.58); margin: 0; text-wrap: pretty;\">A long-form interview series featuring celebrities, entrepreneurs, artists, public figures, and inspiring personalities from across Nepal.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Expertise -->\n    \n  <\u002Fsection>\n\n  <!-- ===== MARQUEE ===== -->\n  \n\n  <!-- ===== ABOUT ===== -->\n  <section id=\"about\" data-screen-label=\"About\" style=\"position: relative; padding: 130px 68px; display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 80px; align-items: start; overflow: clip;\">\n    <div style=\"position: absolute; top: 5%; right: -8%; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(201,150,62,0.22) 0%, transparent 65%); filter: blur(70px); pointer-events: none;\"><\u002Fdiv>\n    <div style=\"position: sticky; top: 120px; animation: acRevealLeft 1ms linear both; animation-timeline: view(); animation-range: entry 5% entry 40%;\">\n      <span style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.3em; color: #C9963E;\">01 — THE ARTIST<\u002Fspan>\n      <h2 style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: clamp(38px, 4vw, 60px); line-height: 1.05; margin: 18px 0 0; letter-spacing: -0.01em; color: #F5EFE0;\">A voice that carries a culture forward.<\u002Fh2>\n      <div style=\"margin-top: 40px; border-radius: 18px; overflow: hidden; height: 280px; background: #212126; border: 1px solid rgba(201,150,62,0.2);\">\n        <div id=\"about-photo\" style=\"width: 100%; height: 280px;; display: flex; align-items: center; justify-content: center; background: rgba(201,150,62,0.06); border: 1px dashed rgba(201,150,62,0.28); border-radius: 12px; box-sizing: border-box;\">\n    <div style=\"text-align: center; padding: 16px;\">\n      <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\" style=\"display:block;margin:0 auto 8px;\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"1\" y=\"1\" width=\"26\" height=\"26\" rx=\"4\" stroke=\"rgba(201,150,62,0.45)\" stroke-width=\"1.5\"><\u002Frect><circle cx=\"9\" cy=\"10\" r=\"2.5\" stroke=\"rgba(201,150,62,0.45)\" stroke-width=\"1.5\"><\u002Fcircle><path d=\"M1 19l7-5 5 4 4-3 9 7\" stroke=\"rgba(201,150,62,0.45)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <span style=\"font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: rgba(201,150,62,0.45);\">ANITA ON STAGE OR AT AN EVENT<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 32px; animation: acRevealRight 1ms linear both; animation-timeline: view(); animation-range: entry 5% entry 40%;\">\n      <p style=\"font-family: Cormorant Garamond, serif; font-size: 24px; line-height: 1.65; font-weight: 600; color: rgba(245,239,224,0.92); margin: 0; text-wrap: pretty;\">Anita Chalaune is one of Nepal's most celebrated folk, modern folk, and Lok Dohori singers — and a producer, entrepreneur, television host, and digital media executive.<\u002Fp>\n      <p style=\"font-size: 16px; line-height: 1.82; color: rgba(245,239,224,0.58); margin: 0; text-wrap: pretty;\">Beginning her professional career around 2010 in Lok Dohori — Nepal's traditional call-and-response folk — and Teej songs, she has since blended modern folk with energetic commercial sounds. Her vibrant vocals, catchy melodies, and dance-friendly performances have made her music a staple at festivals, weddings, and celebrations across Nepal and the global diaspora.<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: repeat(3,1fr); gap: 14px;\">\n        <div style=\"background: #212126; border: 1px solid rgba(201,150,62,0.22); border-radius: 16px; padding: 26px 20px; text-align: center;\">\n          <div style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 38px; color: #C9963E;\">2010<\u002Fdiv>\n          <div style=\"font-size: 10px; letter-spacing: 0.18em; color: rgba(245,239,224,0.45); margin-top: 6px;\">CAREER BEGAN<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #212126; border: 1px solid rgba(201,150,62,0.22); border-radius: 16px; padding: 26px 20px; text-align: center;\">\n          <div style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 38px; color: #C9963E;\">3+<\u002Fdiv>\n          <div style=\"font-size: 10px; letter-spacing: 0.18em; color: rgba(245,239,224,0.45); margin-top: 6px;\">VENTURES BUILT<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #212126; border: 1px solid rgba(201,150,62,0.22); border-radius: 16px; padding: 26px 20px; text-align: center;\">\n          <div style=\"font-family: Cormorant Garamond, serif; font-weight: 700; font-size: 38px; color: #C9963E;\">10+<\u002Fdiv>\n          <div styl
